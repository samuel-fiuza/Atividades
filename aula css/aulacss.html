<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS na pratica</title>
    <style>
        h2{
            color: green;
        }
        .destaque{
            color: orange;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Testando prioridades do CSS</h1>

    <h2 style="color: red;">Inline (roxo)</h2>

    <h2>Interno (verde)</h2>

    <h2 class="externo">Externo (vermelho)</h2>

    <!--conflito-->
    <h2 class="destaque">Quem ganha (inline vs classe vs externo)</h2>
</body>
</html>
