<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  
    <H1>Cadastro</H1>
    <fieldset>
        <legend>Informaçõe necessarias</legend>
    <form action="receber-dados.jtml" method="post">
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" placeholder="Digite seu nome" required>
        <select id="Sexo" required>
            <option value="">Sexo</option>
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
        </select>

        <br>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" placeholder="cpf" required>
        <label for="rg">RG:</label>
        <input type="text" id="rg" placeholder="rg">
        <label for="nascimento">Data de nascimento:</label>
        <input type="date" id="nascimento" name="nascimento" placeholder="dd/mm/aaaa" required>

        <br>

        <label for="ddd">DDD:</label>
        <input type="text" id="ddd" placeholder="Digite seu DD">
        <label for="telefone">Telefone</label>
        <input type="number" id="telefone" placeholder="55+ (11) 12345-6789" required>
        <label for="celular">Celular:</label>
        <input type="tel" id="celular" pattern="[0-9]+" placeholder="55+ (88) 12345-6789" required>

        <br>

        <label for="cep">CEP:</label>
        <input type="number" id="cep" placeholder="097052201">
        <label for="endereco">Endereço</label>
        <input type="text" id="endereco" placeholder="avenidada beira mar" required>
        <label for="numero">Numero:</label>
        <input type="number" id="numero" placeholder="3680" required>

        <br>

        <label for="bairro">Bairro:</label>
        <input type="text" id="bairro" placeholder="">
        <label for="complemento">Complemento:</label>
        <input type="text" id="complemento" placeholder="perto do portal da volta" required>
        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Fortaleza" required>
        <select id="estado" required>
            <option value="">Estado</option>
            <option value="ceara">Ceara</option>
            <option value="itajai">Itajai</option>
        </select>

        <br>

        <button type="submit">Salvar</button>


    </form>
   </fieldset>
</body>
</html>
